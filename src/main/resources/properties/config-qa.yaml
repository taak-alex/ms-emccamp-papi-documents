salesforce-sapi:
  host: "emccamp-salesforce-sapi-s8f7oy.5sc6y6-4.usa-e2.cloudhub.io"            # TODO host do SAPI no QA (ex.: emccamp-salesforce-sapi-qa.<regiao>.cloudhub.io)
  port: "443"
  basePath: "/api"    # SAPI escuta em /api/* (documentos-comprador, content-versions)
  protocol: "HTTPS"
  timeout: "30000"

idp:
  # Endpoint do IDP Runtime — copie o host/basePath que o Studio pré-preenche
  # na config gerada do connector (varia por região).
  host: "idp-rt.us-east-1.anypoint.mulesoft.com"   # US East (bate com o token em anypoint.mulesoft.com)
  port: "443"
  basePath: "/"       # published-action connector: raiz "/" (o caminho /api/v1/organizations/... ja vem embutido nas operations). Confirme com o valor que o Studio pre-preenche.
  protocol: "HTTPS"
  timeout: "30000"
  # Token OAuth do Connected App. US: anypoint.mulesoft.com | EU: eu1.anypoint.mulesoft.com
  access-token-url: "https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token"
  poll:
    max-retries: "18"     # 18 x 10s = ~3 min de espera máxima
    interval-ms: "10000"  # mínimo permitido pelo IDP

files:
  output-dir: "/tmp/emccamp-idp"   # pasta onde os CSVs sao gravados (criada automaticamente pelo file:write)